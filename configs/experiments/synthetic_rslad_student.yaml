schema_version: 2
protocol: {id: synthetic_smoke_v2}
tier: smoke
seeds: {split: 0, model_init: 0, data_order: 0, augmentation: 0, train_attack: 0, evaluation_attack: 0, qualitative_panel: 0}
dataset: {name: synthetic_cifar, num_samples: 16, num_classes: 10, image_size: 32, seed: 0}
student: {architecture: fixture_cnn, num_classes: 10, preprocessing_owner: student_adapter}
teacher: {source: fixture, architecture: fixture_cnn, num_classes: 10, preprocessing_owner: teacher_adapter}
method:
  id: rslad_student
  version: 1
  target_policy: {id: teacher_target_uniform_mix, version: 1, risk_transform: identity, mixing: uniform, apply_to: adversarial_student_kd, rho_max: 0.5}
  student_ema_decay: 0.9
  student_policy_warmup_epochs: 1
  oracle_mask: false
  attack: {loss: kl, kl_target: teacher_clean, temperature: 1.0, temperature_squared: true, epsilon: 8/255, step_size: 2/255, steps: 10, random_start: true, trace_step_losses: false}
optimizer: {id: sgd, learning_rate: 0.01, momentum: 0.9, weight_decay: 0.0, nesterov: false}
scheduler: {id: identity, milestones: [], gamma: 1.0, step_at: epoch_end}
training: {epochs: 1, per_rank_batch_size: 4, global_batch_size: 4, device: cpu}
evaluation: {seed: 0}
tracking: {mode: disabled, diagnostics_mode: "off", panel_size: 0, panel_interval_epochs: 5, artifact_interval_epochs: 5}
output_dir: outputs/smoke-rslad-student
