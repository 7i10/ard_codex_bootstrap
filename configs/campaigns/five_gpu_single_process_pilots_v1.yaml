    phases:
      train: ["{PYTHON}", -m, ard.cli.train, --config, "{CONFIG_PATH}", --output, "{JOB_OUTPUT_DIR}"]
      pgd_evaluate: ["{PYTHON}", -m, ard.cli.evaluate, --config, "{CONFIG_PATH}", --checkpoint-dir, "{JOB_OUTPUT_DIR}", --output, "{JOB_OUTPUT_DIR}/evaluation-pgd"]
